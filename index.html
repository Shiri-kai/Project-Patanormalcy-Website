<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SCP Archive</title>

    <style>
        body {
            margin: 0;
            display: flex;
            background: #0f1115;
            color: #e6e6e6;
            font-family: Arial;
        }

        aside {
            width: 300px;
            height: 100vh;
            overflow-y: auto;
            background: #171a21;
            padding: 15px;
        }

        main {
            flex: 1;
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #222733;
            border: none;
            color: white;
            margin-bottom: 10px;
        }

        .category {
            margin-left: 10px;
        }

        .doc-link {
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
        }

        .doc-link:hover {
            background: #2a2f3a;
        }

        .tag {
            background: #2b3342;
            padding: 4px 8px;
            margin: 3px;
            display: inline-block;
            border-radius: 999px;
            cursor: pointer;
        }

        .tag:hover {
            background: #3a4455;
        }

        .doc-card {
            background: #171a21;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: 75vh;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <aside>
        <h2>SCP Archive</h2>
        <input id="search" placeholder="Search..." />
        <div id="nav"></div>
    </aside>

    <main>
        <div id="results"></div>
        <div id="viewer"></div>
    </main>

    <script src="app.js"></script>
</body>

</html>
